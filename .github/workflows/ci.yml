# Pipeline de Integración Continua (CI) — Proyecto GPS
#
# Siguiendo las prácticas DevOps vistas en clase (integración y entrega
# continua, testing automatizado e infraestructura como código):
#   1. Tests automatizados del backend (Jest + Supertest).
#   2. Lint y build del frontend (ESLint + Vite).
#   3. Validación de las imágenes Docker (entrega continua).
name: CI

on:
  push:
    branches: [main, avances]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend — tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests
        run: npm test

  frontend-build:
    name: Frontend — lint y build (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build de producción
        run: npm run build

      - name: Publicar artefacto del build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: Frontend/build
          retention-days: 7

  docker-build:
    name: Docker — validar imágenes
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: gps-backend:ci

      - name: Build imagen frontend
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend
          push: false
          tags: gps-upload:ci
