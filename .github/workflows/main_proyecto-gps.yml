# Despliegue a Azure Web App (Proyecto-GPS)
#
# Corregido: el workflow original apuntaba al directorio inexistente
# "Proyect-Gest-Docum" y fallaba en cada push. Ahora compila el Frontend
# real y solo se ejecuta manualmente (workflow_dispatch) para no duplicar
# el CI de ci.yml en cada push.
name: Build and deploy Node.js app to Azure Web App - Proyecto-GPS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: npm install, build, and test
        run: |
          npm ci
          npm run build --if-present
          npm run test --if-present
        working-directory: Frontend

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: Frontend/build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_36C55118950E44849FD1C97CC688D76C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5392CEDA4D794F088790793CA0017B24 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B1F1DC7005B4489398A90655E3E9AE6A }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Proyecto-GPS'
          slot-name: 'Production'
          package: .
